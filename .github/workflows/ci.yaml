name: CI

# Thin caller. The three generic Android jobs (lint, test, build) live in
# shared-ci.yaml so derived projects can pull future template fixes by bumping
# the `uses:` ref.
#
# DERIVED PROJECTS: after running scripts/rename.py, update the `uses:` line
# below to a cross-repo pinned ref, e.g.:
#   uses: kikin81/android-template/.github/workflows/shared-ci.yaml@v1
# Renovate will then track new releases.

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  ci:
    uses: ./.github/workflows/shared-ci.yaml
    secrets: inherit

  rename-script:
    # Template-only job — verifies the one-shot rename script against a fresh
    # `android create` output. Safe to delete in derived projects (rename.py
    # itself is deleted after first use).
    name: Rename script
    runs-on: ubuntu-latest
    env:
      RUN_FULL_BUILD: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version-file: .java-version

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Check for android CLI
        id: android_cli
        run: |
          if command -v android >/dev/null 2>&1; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::android CLI not found on runner — skipping rename self-test."
            echo "::warning::Track follow-up: publish or vendor the android CLI for CI."
          fi

      - name: Run rename self-test
        if: steps.android_cli.outputs.present == 'true'
        run: python3 -m unittest scripts/test_rename.py -v
